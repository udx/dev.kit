# dev.kit Worker Deployment Configuration
# Used by @udx/worker-deployment (worker run) to emulate high-fidelity Ubuntu environment.

kind: workerDeployConfig
version: udx.io/worker-v1/deploy

config:
  image: "usabilitydynamics/udx-worker:latest"
  name: "dev-kit-worker-suite"
  
  volumes:
    - ".:/workspace"
  
  working_dir: "/workspace"
  
  env:
    - "DEV_KIT_SOURCE=/workspace"
    - "TERM=xterm-256color"
  
  # Default command to run the test suite
  command: "/bin/bash tests/suite.sh"
