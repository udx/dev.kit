name: reusable-check

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
    outputs:
      status:
        description: check status
        value: ${{ jobs.test.outputs.status }}

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      status: ok
    steps:
      - run: echo "status=ok" >> "$GITHUB_OUTPUT"
