description: dev.kit prompt eval for repo-first agent guidance
prompts:
  - file://tests/promptfoo/prompts/baseline.txt
  - file://tests/promptfoo/prompts/with-dev-kit.txt
providers:
__PROVIDER__
tests:
  - description: current-repo-start-here
    vars:
__REPO_PATH__
__REPO_TASK__
      explore_json: |
__EXPLORE_JSON__
      action_json: |
__ACTION_JSON__
    assert:
      - type: is-json
        value:
          type: object
          required:
            - summary
            - read_first
            - next_steps
            - risks
          properties:
            summary:
              type: string
            read_first:
              type: array
              minItems: 1
            next_steps:
              type: array
              minItems: 1
            risks:
              type: array
      - type: javascript
        value: |
          const lowered = output.toLowerCase();
          const signals = [
            'readme',
            'docs',
            'tests',
            'dev.kit',
            'workflow',
            'repo'
          ];
          return signals.filter((signal) => lowered.includes(signal)).length >= 2;
