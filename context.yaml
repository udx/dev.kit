---
kind: contextConfig
description: "Repository context to dynamically resolve development drift via dev.kit"
version: udx/dev.kit/context/v1
config:
  runtime: shell
  registry: github

  # Standardized references for compliance and quality
  standards:
    - https://12factor.net/
    - udx/standards/mermaid
    - udx/standards/yaml

  # Auto-detected or explicitly defined dependencies
  dependencies:
    - https://cli.github.com/
    - https://docs.docker.com/engine/install/
    - https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html

  # External knowledge base references
  refs:
    - https://udx.io/cloud-automation-book/creativity
    - https://udx.io/cloud-automation-book/standards
    - https://udx.io/cloud-automation-book/automation-best-practices
