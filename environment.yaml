# dev.kit Environment Orchestrator
# Standardize configurations across hosts and repositories.

system:
  quiet: false
  developer: false
  state_path: "~/.udx/dev.kit/state"

exec:
  prompt: "ai.gemini.v1"
  stream: false

ai:
  enabled: false
  provider: "gemini" # Supported: gemini
  auto_sync: true   # Automatically synchronize skills on shell load
  # Discovery: Capabilities resolved at runtime via lib/commands and docs/skills

context:
  enabled: true
  max_bytes: 4000
  storage: "repo" # repo-scoped storage for context

install:
  path_prompt: true
