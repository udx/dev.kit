kind: auditRules
version: udx.dev/dev.kit/v1
description: Gap messages and guidance for missing or partial repo factors

config:
  rules:
    - id: missing-documentation
      factor: documentation
      status: missing
      message: Add a README so humans and agents can orient quickly around purpose, workflow, and boundaries.
    - id: partial-dependency-contract
      factor: dependencies
      status: partial
      message: Runtime signals exist, but the dependency contract is incomplete. Prefer an explicit language or package manifest over container-only dependency discovery.
    - id: missing-dependency-manifest
      factor: dependencies
      status: missing
      message: Add an explicit dependency manifest so builds and runtime assumptions do not depend on tribal knowledge.
    - id: partial-config-contract
      factor: config
      status: partial
      message: Config signals exist, but no explicit env contract file was detected. Add .env.example, .env.sample, or .env.template when runtime configuration is required.
    - id: missing-config-contract
      factor: config
      status: missing
      message: No explicit configuration contract was detected. Add runtime config docs or an env example when the repo requires environment configuration.
    - id: partial-pipeline
      factor: pipeline
      status: partial
      message: Some CI/CD signals detected but the pipeline is incomplete. Add workflow files, test commands, or deploy configuration.
    - id: missing-pipeline
      factor: pipeline
      status: missing
      message: No CI/CD pipeline detected. Add GitHub workflows, test commands, or deploy configuration so the repo can be validated and deployed.
