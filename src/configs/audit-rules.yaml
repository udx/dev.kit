rules:
  - id: missing-documentation
    factor: documentation
    status: missing
    message: Add a README so humans and agents can orient quickly around purpose, workflow, and boundaries.
  - id: partial-dependency-contract
    factor: dependencies
    status: partial
    message: Runtime signals exist, but the dependency contract is incomplete. Prefer an explicit language or package manifest over container-only dependency discovery.
  - id: missing-dependency-manifest
    factor: dependencies
    status: missing
    message: Add an explicit dependency manifest so builds and runtime assumptions do not depend on tribal knowledge.
  - id: partial-config-contract
    factor: config
    status: partial
    message: Config signals exist, but the environment contract is only partially documented. Add an example env file or clearer config documentation.
  - id: missing-config-contract
    factor: config
    status: missing
    message: Externalize configuration and document the environment contract so the repo can move cleanly across environments.
  - id: partial-verification-entrypoint
    factor: verification
    status: partial
    message: Verification assets exist, but no single entrypoint was detected. Expose one command such as make test or document the canonical runner.
  - id: missing-verification-entrypoint
    factor: verification
    status: missing
    message: Add a single runnable verification command so agents and humans can validate changes deterministically.
  - id: partial-runtime-entrypoint
    factor: runtime
    status: partial
    message: Runtime assets exist, but the canonical way to start the app is not normalized yet. Document or expose one entrypoint.
  - id: missing-runtime-entrypoint
    factor: runtime
    status: missing
    message: Define a canonical runtime entrypoint so the service can be started predictably across environments.
  - id: partial-build-release-run
    factor: build_release_run
    status: partial
    message: Some build or runtime steps are discoverable, but the build-release-run separation is incomplete. Make the lifecycle explicit.
  - id: missing-build-release-run
    factor: build_release_run
    status: missing
    message: Define explicit build and run steps so release behavior is reproducible and 12-factor aligned.
