kind: contextConfig
version: udx.io/dev.kit/v1

config:
  repo_root_files:
    - README.md
    - readme.md
    - package.json
    - composer.json
    - wp-config.php
    - Dockerfile
    - Makefile
    - makefile
  repo_root_dirs:
    - .git
    - .github
    - .rabbit
  repo_note_files:
    - CLAUDE.md
    - AGENTS.md
    - todo.md
    - TODO.md
    - context.md
    - CONTEXT.md
    - refs.md
    - REFS.md
  # Paths relative to DEV_KIT_HOME surfaced as fallback refs when absent from target repo.
  # Local absolute path if dev.kit is installed; GitHub raw URL otherwise.
  kit_source_refs:
    - src/configs/github-issues.yaml
    - src/configs/github-prs.yaml
    - .github/ISSUE_TEMPLATE
    - .github/PULL_REQUEST_TEMPLATE.md

  priority_paths:
    - README.md
    - readme.md
    - docs/architecture.md
    - docs/lessons-learned.md
    - docs
    - .rabbit
    - .github/workflows
    - Makefile
    - package.json
    - composer.json
    - Dockerfile
    - docker-compose.yml
    - docker-compose.yaml
    - deploy.yml
    - deploy.yaml
    - wp-config.php
    - Chart.yaml
    - helmfile.yaml
    - k8s
    - charts
    - terraform
    - lib
    - src
    - scripts
    - tests
  repo_doc_paths:
    - .rabbit/context.yaml
    - CLAUDE.md
    - AGENTS.md
    - README.md
    - readme.md
    - docs/lessons-learned.md
    - docs/architecture.md
    - docs
    - .rabbit/dev.kit
  marker_groups:
    git_root:
      prefix: git
      kind: dir
      paths:
        - .git
    readme_docs:
      prefix: docs
      kind: file
      paths:
        - README.md
        - readme.md
    todo_notes:
      prefix: notes
      kind: file
      paths:
        - TODO.md
        - todo.md
    refs_notes:
      prefix: notes
      kind: file
      paths:
        - refs.md
        - REFS.md
    wordpress_framework:
      prefix: framework
      kind: file
      paths:
        - wp-config.php
    node_manifest:
      prefix: manifest
      kind: file
      paths:
        - package.json
    composer_manifest:
      prefix: manifest
      kind: file
      paths:
        - composer.json
    docker_runtime:
      prefix: runtime
      kind: file
      paths:
        - Dockerfile
    deploy_files:
      prefix: deploy
      kind: file
      paths:
        - deploy.yml
        - deploy.yaml
    make_build:
      prefix: build
      kind: file
      paths:
        - Makefile
        - makefile
    github_workflows:
      prefix: workflow
      kind: dir
      paths:
        - .github/workflows
    udx_root:
      prefix: udx
      kind: dir
      paths:
        - .rabbit
    infra_configs:
      prefix: infra
      kind: dir
      paths:
        - .rabbit/infra_configs
    docs_dir:
      prefix: docs
      kind: dir
      paths:
        - docs
    tests_dir:
      prefix: verify
      kind: dir
      paths:
        - tests
