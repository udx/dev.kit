kind: contextConfig
version: udx.io/dev.kit/v1

config:
  lists:
    repo_root_files:
      - README.md
      - readme.md
      - package.json
      - composer.json
      - wp-config.php
      - Dockerfile
      - Makefile
      - makefile
      - deploy.yml
      - deploy.yaml
    repo_root_dirs:
      - .git
      - .github
      - .rabbit
      - docs
      - src
      - lib
      - tests
    repo_note_files:
      - todo.md
      - TODO.md
      - context.md
      - CONTEXT.md
      - refs.md
      - REFS.md
    priority_paths:
      - README.md
      - readme.md
      - TODO.md
      - todo.md
      - CONTEXT.md
      - context.md
      - REFS.md
      - refs.md
      - .rabbit/infra_configs
      - docs
      - .rabbit
      - .github/workflows
      - Makefile
      - src/configs/development-practices.yaml
      - package.json
      - composer.json
      - Dockerfile
      - docker-compose.yml
      - docker-compose.yaml
      - deploy.yml
      - deploy.yaml
      - wp-config.php
      - Chart.yaml
      - helmfile.yaml
      - k8s
      - charts
      - terraform
      - lib
      - src
      - scripts
      - tests
