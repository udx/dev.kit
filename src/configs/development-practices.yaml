kind: developmentPractices
version: udx.io/dev.kit/v1

config:
  practices:
    - id: context-driven-engineering
      message: Keep the repository as the primary source of truth so context-driven engineering comes from repo contracts, docs, tests, config, and repo-native notes instead of agent memory.
    - id: repo-centric
      message: Prefer repo-centric mechanisms that discover workflows, tools, formats, and refs dynamically instead of hardcoding per-agent assumptions.
    - id: self-contained
      message: Keep markdown, yaml, diagrams, tests, and command contracts self-contained in the repo so local and remote UDX workflows stay aligned.
    - id: strict-agent-boundary
      message: Keep deterministic workflow logic in repo config and scripts, and reserve AI agents for reading that contract, generating grounded summaries, and handling non-deterministic judgment without inventing hidden rules.
    - id: context-over-memory
      message: Operate from repo-declared context at all times. Do not carry assumptions across sessions or rely on prompt history when the repo contract is available on disk.
    - id: github-history-primary
      message: After loading the repo contract, prefer current GitHub issues, pull requests, review state, and commit history as the primary dynamic source for agent decisions. Use repo workflow and practice catalogs as fallback defaults when live GitHub signal is missing or thin.
    - id: github-style-reuse
      message: Reuse the repo's current GitHub patterns for branch names, PR titles and descriptions, issue writeups, and follow-up comments instead of inventing a new style for each change.
    - id: manifests-before-code
      message: When understanding behavior, read the YAML manifest that defines it before reading the code that implements it. Manifests are the interface — code is the mechanism.
    - id: reuse-over-invention
      message: Check existing org patterns, configs, workflows, and templates before creating new ones. Reuse declared patterns instead of inventing alternatives.
    - id: workflow-first-verification
      message: Detect the repo's canonical verification surface from context, but prefer GitHub workflow executions and monitor their outcomes when the repo already has CI coverage. Use local verification for quick scoped debugging, missing CI coverage, or reproducing workflow failures.
    - id: bot-feedback-loop
      message: After a PR exists, read automated review feedback, fix actionable findings, reply to false positives, resolve threads, and repeat until workflow state and bot feedback are clean.
    - id: delivery-chain-traceability
      message: Keep the delivery chain explicit — branch, PR, and issue must be connected before close-out. Do not treat any step as done until the link to the next step is visible.
    - id: structured-outcome-reporting
      message: Report outcomes with exact URLs, versions, findings deltas, and next steps so follow-up can be reused by humans and agents without drift.
    - id: docs-first-alignment
      message: Use README, docs, and tests as the first alignment surface before broad refactors. Read the declared workflow before changing the implementation.
    - id: standard-repo-first
      message: Do not require custom repo files for dev.kit to work. Prefer standard engineering signals such as README, docs, tests, manifests, workflows, and deployment config, with dev.kit-owned continuity treated as optional acceleration only.
    - id: config-over-code
      message: Express repo rules in YAML manifests first, then keep shell glue thin and composable. Policy belongs in config, not buried in imperative scripts.
    - id: legacy-reduction
      message: When a new direction is accepted, archive or delete conflicting old modules and configs instead of carrying both models forward.
    - id: verification-scope
      message: If local verification is needed, run the smallest local check that proves the current change. Prefer broader or slower coverage in GitHub workflows, monitor the workflow run, and call the tradeoff out explicitly.
    - id: incremental-development
      message: Make sure to develop and test incrementally, so it is easier to detect problems early and build on verified behavior.
    - id: scoped-execution
      message: Make sure to protect development executions with scoped and limited tasks, so failures are easier to isolate and blast radius stays low.
    - id: cross-repo-issue-context
      message: Use the linked GitHub issue as the cross-repo context root. When work spans multiple repos, the issue URL anchors scope, acceptance criteria, and follow-up across all of them.
