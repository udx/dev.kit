kind: developmentWorkflows
version: udx.io/dev.kit/v1

config:
  defaults:
    workflow: action-git
    behavior: evaluation-only
    hooks_dir: .githooks
    text_max_next_steps: 4
    branch_roles:
      base: base
      feature: feature
    base_branch_names:
      - latest
      - main
      - master
      - development
      - staging
      - trunk
  workflows:
    action-git:
      name: dev.action git
      description: Evaluate local git workflow state without changing branches, remotes, or pull requests
      capabilities:
        required_commands:
          - git
        optional_commands:
          - gh
      steps:
        - id: context_refresh
          label: Refresh repo context
          check: context_refresh
          optional: true
          note: >
            Run `dev.kit` → `dev.kit repo` → `dev.kit agent` before starting work.
            Each command guides to the next required step. This resyncs repo context,
            environment state, and the AGENTS.md execution contract. A current
            context.yaml is the source of truth for refs, commands, gaps, and lessons.
            Do not rely on ad hoc prompt memory when the repo contract can be read
            from disk. When GitHub context is available, prefer current issues,
            pull requests, review state, and commit history over stale memory or
            generic workflow defaults.
        - id: issue_scope
          label: Read linked GitHub issue and confirm scope
          check: issue_scope
          optional: true
          note: >
            If a GitHub issue URL is available, read the full body and comments,
            confirm the repo matches the issue scope, and map acceptance criteria
            before writing any code. Use the issue URL as the cross-repo context root.
        - id: github_pattern_reuse
          label: Reuse GitHub repo patterns
          check: github_pattern_reuse
          optional: true
          note: >
            Before creating a branch, PR, issue, or status update, inspect the
            repo's recent GitHub history and reuse its established naming and
            writing patterns. Treat existing branch names, PR titles and bodies,
            issue templates, and close-out comments as the default style guide.
        - id: worktree_status
          label: Inspect git status
          check: git_status
        - id: change_analysis
          label: Analyze local changes
          check: change_analysis
        - id: branch_analysis
          label: Analyze branch state
          check: branch_analysis
        - id: logical_commits
          label: Group logical commits
          check: logical_commits
        - id: release_metadata
          label: Bump version and changelog if supported
          check: release_metadata
        - id: branch_prepare
          label: Create or validate feature branch
          check: branch_prepare
        - id: remote_push
          label: Push branch to remote
          check: remote_push
        - id: pr_prepare
          label: Generate pull request description
          check: pr_prepare
          note: >
            Pick the PR template type from src/configs/github-prs.yaml (feature,
            deployment, ops, hotfix). Fill every required section. Include "Closes #N"
            for linked issues. Add a "Backlog from this investigation" section for any
            new gaps found. Use .github/PULL_REQUEST_TEMPLATE.md as the base form.
        - id: pr_create
          label: Create pull request
          check: pr_create
        - id: workflow_monitor
          label: Monitor related workflow executions
          check: workflow_monitor
          optional: true
          note: >
            After PR creation, monitor the related GitHub workflow runs and status
            checks. Open the run details when needed, watch for failed or stuck jobs,
            and treat GitHub workflow execution as the primary verification path when
            the repo already has CI coverage.
        - id: bot_review
          label: Loop automated review feedback
          check: bot_review
          optional: true
          note: >
            After PR creation, wait for Copilot, Devin, and CodeQL reviews.
            Read each review from github-prs.yaml bot guidance. Address actionable
            findings with code changes, reply to each bot comment, and resolve the
            thread when handled. Repeat this loop after each push until bot feedback
            is clean. Do not request human review while bot findings are unaddressed.
        - id: checks_verify
          label: Verify required status checks
          check: checks_verify
          optional: true
          note: >
            All required checks must pass before requesting human review.
            For infra PRs, open check details and review the Terraform plan output.
            For CodeQL, review findings in the Security tab. When the repo already
            has GitHub workflow coverage, prefer those executions as the primary
            verification path and monitor them closely. Use local verification to
            reproduce failures or cover gaps, not as a universal gate.
        - id: issue_update
          label: Post close-out comment on linked issue
          check: issue_update
          optional: true
          note: >
            After PR is created, post a brief comment on the linked issue with the PR URL,
            what changed, and any follow-up items. GitHub auto-closes the issue on merge
            when "Closes #N" is in the PR body — do not close manually.
        - id: post_merge
          label: Post-merge close-out and backlog
          check: post_merge
          optional: true
          note: >
            After merge: verify issue auto-closed, post close-out comment, open issues
            for any backlog items from the PR, verify monitoring changes are live.
            See post_merge steps in github-prs.yaml.
