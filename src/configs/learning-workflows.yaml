kind: learningWorkflows
version: udx.io/dev.kit/v1

config:
  source_discovery:
    local_session_roots:
      - $CODEX_HOME/sessions
    claude_projects_root: ~/.claude/projects
    enabled_sources:
      - claude
      - codex
    max_recent_sessions: 6
  workflows:
    pr-lessons:
      name: dev.learn pr
      description: Generate lightweight lessons-learned from recent pull requests and agent sessions, then route reusable workflow patterns into durable repo artifacts
      sources:
        - recent pull requests
        - docs/pull-requests.md
        - docs/engineering-guide.md
        - TODO.md
        - refs.md
      destinations:
        - lessons_report
        - gh_issue
        - wiki
        - slack
  session_flow:
    issue-scope:
      threshold: 2
      message: Read the linked GitHub issue, verify the repo/workspace match, and lock the scope before changing code.
      patterns:
        - /issues/
        - issue details
        - affected code path
    verify-before-sync:
      threshold: 2
      message: Prefer GitHub workflow verification when the repo has CI coverage, monitor the run, and use local verification only when you need a quick scoped check or a reproduction path.
      patterns:
        - make build
        - confirm build
        - verify
    pr-chain:
      threshold: 2
      message: Commit or sync the branch, prepare the PR in the repo’s style, and link the related issue.
      patterns:
        - sync to remote
        - brief pr
        - related github issue
    github-style-reuse:
      threshold: 2
      message: Before creating a branch, PR, issue, or GitHub update, inspect recent repo history and reuse the repo's established naming and writing patterns.
      patterns:
        - previous prs
        - repo style
        - branch name
        - title and description
    post-follow-up:
      threshold: 2
      message: After merge or release, collect workflow and artifact evidence, then post a concise linked update with next steps.
      patterns:
        - merged
        - release
        - artifacts
        - update comment
    docs-first-alignment:
      threshold: 2
      message: Review README, docs, and tests before refactoring. Restate the target workflow, then simplify code and remove mismatched legacy paths.
      patterns:
        - readme
        - docs
        - refactor
        - cleanup
    workflow-tracing:
      threshold: 2
      message: Locate the actual workflow or deploy file first, then trace the commands and supporting docs that drive execution.
      patterns:
        - deploy.yml
        - .github/workflows
        - workflow file
        - workflow gaps
        - what deploy.yml actually does
        - what actually runs
        - trace
    verification-scope:
      threshold: 2
      message: If local verification is needed, run the smallest local check that proves the current change. Prefer broader or slower coverage in GitHub workflows, monitor the run, and call the tradeoff out explicitly.
      patterns:
        - make test
        - local check
        - CI
        - defer
    legacy-reduction:
      threshold: 2
      message: When a new direction is accepted, archive or delete conflicting old modules/configs instead of carrying both models forward.
      patterns:
        - cleanup
        - legacy
        - remove
        - consolidate
    agent-handoff:
      threshold: 2
      message: Refresh repo context, manifests, and AGENTS.md before deeper agent work so the repo contract is the source of truth.
      patterns:
        - dev.kit repo
        - dev.kit agent
        - refresh context
        - agents.md
    history-debugging:
      threshold: 2
      message: When debugging or widening scope, use related GitHub issues, PRs, and recent repo history first to understand prior changes and possible regressions.
      patterns:
        - previous changes
        - breaking change
        - related prs
        - debug
  session_rules:
    verify-before-deploy:
      threshold: 2
      message: Prefer the repo's GitHub workflow executions for build or runtime verification before deploy-oriented steps, and use local verification when you need to reproduce or isolate a failure.
      patterns:
        - make build
        - confirm build
        - deploy.yml
    workflow-file-first:
      threshold: 2
      message: Use repo workflow assets like deploy.yml, workflow files, and repo docs as the execution contract instead of inventing an ad hoc deploy path.
      patterns:
        - deploy.yml
        - workflow
        - readme.md
    sync-pr-issue-chain:
      threshold: 2
      message: Keep the delivery chain explicit: create or sync the branch, prepare the PR, and connect the related GitHub issue before close-out.
      patterns:
        - sync to remote
        - brief pr
        - related github issue
    bot-review-loop:
      threshold: 2
      message: After a PR exists, read automated review feedback, fix actionable findings, reply to false positives, resolve the threads, and repeat until bot feedback is clean.
      patterns:
        - codeql
        - copilot
        - devin
        - review comment
    source-backed-updates:
      threshold: 3
      message: Report outcomes with exact URLs, versions, findings deltas, and next steps so the follow-up can be reused by humans and agents without drift.
      patterns:
        - release
        - findings
        - next step
        - add url
    config-over-code:
      threshold: 2
      message: Express repo rules in YAML/manifests first, then keep shell glue thin and composable.
      patterns:
        - yaml
        - manifest
        - config
        - thin wrapper
    agent-context-refresh:
      threshold: 2
      message: Refresh repo context and AGENTS.md from repo artifacts before deeper agent work so the workflow stays repo-centric.
      patterns:
        - dev.kit
        - context.yaml
        - agents.md
        - refresh
