    - src
    - app
    - modules
    - services
    - controllers
    - models
    - views
    - templates
    - configs
    - docs
  architecture_command_dirs:
    - lib/commands
    - app/controllers
    - src/controllers
    - cmd
  architecture_logic_dirs:
    - lib/modules
    - app/models
    - app/services
    - src/models
    - src/services
    - internal
    - modules
    - services
  architecture_view_dirs:
    - src/templates
    - app/views
    - src/views
    - templates
  architecture_config_dirs:
    - src/configs
    - config
    - configs
  architecture_source_globs:
    - *.sh
    - *.js
    - *.cjs
    - *.mjs
    - *.ts
    - *.tsx
    - *.php
    - *.py
    - *.rb
  verification_files:
    - phpunit.xml
    - phpunit.xml.dist
  verification_globs:
    - *.bats
    - *test*.sh
  architecture_command_max_lines: 120
  architecture_module_max_lines: 400
  architecture_present_category_min: 3
  architecture_partial_category_min: 2
