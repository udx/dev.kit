    - .env.sample
    - .env.template
    - docker-compose.yml
    - docker-compose.yaml
    - deploy.yml
    - deploy.yaml
  runtime_files:
    - Dockerfile
    - Procfile
  shell_dirs:
    - bin
    - scripts
    - lib
  shell_globs:
    - *.sh
  test_dirs:
    - tests
    - test
    - spec
  example_dirs:
    - examples
    - fixtures
  workflow_globs:
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
  workflow_primary_files:
    - action.yml
    - action.yaml
  deploy_files:
    - deploy.yml
    - deploy.yaml
    - docker-compose.yml
    - docker-compose.yaml
  infra_dirs:
    - terraform
    - k8s
    - cd
  architecture_layer_dirs:
    - lib/commands
    - lib/modules
    - src/templates
    - src/configs
    - app/controllers
    - app/models
    - app/views
    - app/services
    - src/controllers
    - src/models
    - src/views
    - src/services
    - internal
    - cmd
    - templates
    - configs
  architecture_partial_dirs:
