kind: detectionSignals
version: udx.io/dev.kit/v1

config:
  documentation_files:
    - README.md
    - README
    - readme.md
  documentation_hub_files:
    - docs/README.md
    - docs/readme.md
  markdown_file_globs:
    - README*
    - docs/*.md
    - docs/**/*.md
  prune_dirs:
    - .git
    - wp-admin
    - wp-content
    - wp-includes
    - node_modules
    - vendor
    - .venv
    - venv
    - .terraform
    - dist
    - build
    - coverage
    - .next
    - .nuxt
    - .turbo
    - .cache
    - target
    - out
    - tmp
    - artifacts
  makefiles:
    - Makefile
    - makefile
    - GNUmakefile
  node_files:
    - package.json
  php_files:
    - composer.json
    - phpunit.xml
    - phpunit.xml.dist
  container_files:
    - Dockerfile
    - docker-compose.yml
    - docker-compose.yaml
  container_globs:
    - Dockerfile.*
  dependency_manifest_files:
    - package.json
    - composer.json
    - requirements.txt
    - pyproject.toml
    - go.mod
    - Cargo.toml
    - Gemfile
  dependency_partial_files:
    - Dockerfile
  config_contract_files:
