kind: detectionSignals
version: udx.io/dev.kit/v1

config:
  documentation_files:
    - README.md
    - README
    - readme.md
  documentation_hub_files:
    - docs/README.md
    - docs/readme.md
  markdown_file_globs:
    - README*
    - docs/*.md
    - docs/**/*.md
  prune_dirs:
    - .git
    - wp-admin
    - wp-content
    - wp-includes
    - node_modules
    - .next
    - vendor
    - dist
    - .venv
    - venv
    - .terraform
    - dist
    - build
    - coverage
    - .next
    - .nuxt
    - .turbo
    - .cache
    - target
    - out
    - tmp
    - artifacts
  makefiles:
    - Makefile
    - makefile
    - GNUmakefile
  node_files:
    - package.json
  wordpress_files:
    - wp-config.php
  wordpress_dirs:
    - wp-content
    - wp-content/plugins
    - wp-content/themes
    - wp-content/mu-plugins
  php_files:
    - composer.json
    - phpunit.xml
    - phpunit.xml.dist
  container_files:
    - Dockerfile
    - docker-compose.yml
    - docker-compose.yaml
  container_globs:
    - Dockerfile.*
  dependency_manifest_files:
    - package.json
    - composer.json
    - requirements.txt
    - pyproject.toml
    - go.mod
    - Cargo.toml
    - Gemfile
  dependency_partial_files:
    - Dockerfile
  config_contract_files:
    - .env.example
    - .env.sample
    - .env.template
    - docker-compose.yml
    - docker-compose.yaml
    - deploy.yml
    - deploy.yaml
  runtime_files:
    - Dockerfile
    - Procfile
  shell_dirs:
    - bin
    - scripts
    - lib
  shell_globs:
    - *.sh
  test_dirs:
    - tests
    - test
    - spec
  example_dirs:
    - examples
    - fixtures
  workflow_globs:
    - .github/workflows/*.yml
    - .github/workflows/*.yaml
  workflow_primary_files:
    - action.yml
    - action.yaml
  deploy_files:
    - deploy.yml
    - deploy.yaml
    - docker-compose.yml
    - docker-compose.yaml
  infra_dirs:
    - terraform
    - k8s
    - cd
  terraform_files:
    - main.tf
    - variables.tf
  terraform_dirs:
    - terraform
  terraform_globs:
    - terraform/*.tf
    - terraform/**/*.tf
    - "*.tf"
  verification_files:
    - phpunit.xml
    - phpunit.xml.dist
  verification_globs:
    - *.bats
    - *test*.sh
  yaml_manifest_globs:
    - "*.yaml"
    - "*.yml"
  # External dependency tracing — files and dirs to scan for cross-repo references.
  # Shell code reads these lists and applies pattern-specific extraction.
  dependency_trace_workflow_dirs:
    - .github/workflows
  dependency_trace_container_files:
    - Dockerfile
  dependency_trace_deploy_files:
    - deploy.yml
    - deploy.yaml
  dependency_trace_infra_dirs:
    - terraform
    - k8s
  # Dirs scanned recursively for YAML files with kind/version headers.
  # The version URI (e.g. udx.dev/rabbit-automation-action/gcp-sql-instance/v1)
  # traces back to source repo and module. This is the primary cross-repo tracing
  # mechanism — repos declare their infrastructure provider in the version field.
  dependency_trace_versioned_dirs:
    - .rabbit
  # Docker Compose files scanned for image: references.
  dependency_trace_compose_files:
    - docker-compose.yml
    - docker-compose.yaml
  # File globs scanned for GitHub URL references (github.com/org/repo patterns).
  # Applied within priority ref dirs and repo root config files.
  dependency_trace_url_globs:
    - "*.yaml"
    - "*.yml"
    - "*.md"
  # Manifest files that define where this repo is hosted/deployed.
  # Listed as config manifests in context.yaml output.
  manifest_workflow_dirs:
    - .github/workflows
  manifest_root_files:
    - deploy.yml
    - deploy.yaml
    - docker-compose.yml
    - docker-compose.yaml
    - Chart.yaml
    - helmfile.yaml
