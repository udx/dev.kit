kind: repoScaffold
version: udx.io/dev.kit/v1
config:

  # Written to <repo>/.dev-kit/manifest.json after a successful learn
  manifest:
    path: .dev-kit/manifest.json

  # Scaffold applied to every repo regardless of archetype
  baseline:
    dirs:
      - docs
      - .github/ISSUE_TEMPLATE
    files:
      - .gitignore
      - AGENTS.md
      - .github/PULL_REQUEST_TEMPLATE.md

  # Additional scaffold items per archetype
  archetypes:
    shell-cli:
      dirs:
        - bin
        - lib/commands
        - lib/modules
        - src/configs
        - src/templates
        - tests
      files:
        - Makefile
        - README.md

    node-app:
      dirs:
        - src
        - tests
      files:
        - package.json
        - README.md

    runtime-image:
      dirs:
        - bin
        - tests
      files:
        - Dockerfile
        - Makefile
        - README.md

    wordpress-site:
      dirs:
        - docs
      files:
        - README.md

    infra-pipeline:
      dirs:
        - .github/workflows
        - terraform
        - docs
      files:
        - README.md

  # Factor-driven scaffold: what to create when a factor is missing or partial
  factors:
    documentation:
      files:
        - README.md
        - docs/overview.md
    verification:
      dirs:
        - tests
      files:
        - tests/smoke.sh
    runtime:
      files:
        - Dockerfile
    config:
      files:
        - .env.example
    build_release_run:
      files:
        - Makefile
