kind: archetypeRules
version: udx.io/dev.kit/v1

config:
  lists:
    precedence:
      - wordpress-site
      - kubernetes-infra
      - worker-automation
      - workflow-repo
      - runtime-image
      - application
      - infra-config
      - library-cli
      - unknown
    configured:
      - wordpress-site
      - kubernetes-infra
      - worker-automation
      - workflow-repo
  archetypes:
    wordpress-site:
      required:
        - framework:wordpress
      supporting:
        - runtime:container
        - package:node
        - package:composer
        - workflow:github
    kubernetes-infra:
      required:
        - platform:kubernetes
      supporting:
        - lifecycle:deploy
        - workflow:github
        - deploy:kubernetes-manifests
        - deploy:terraform
    worker-automation:
      required:
        - workload:automation
      supporting:
        - runtime:container
        - lifecycle:deploy
        - deploy:worker-config
        - package:node
    workflow-repo:
      required:
        - workflow:github
        - repo:workflow-primary
