kind: archetypeRules
version: udx.io/dev.kit/v1

config:
  archetypes:
    wordpress-site:
      description: WordPress website — application code, theme, and plugin assets deployed to a WordPress host
      required:
        - framework:wordpress
      supporting:
        - runtime:container
        - package:node
        - package:composer
        - workflow:github
    workflow-repo:
      description: GitHub Actions reusable workflow repository — shared CI/CD automation consumed by other repositories
      required:
        - workflow:github
        - repo:workflow-primary
    infra-pipeline:
      description: Infrastructure-as-code pipeline — Terraform or Kubernetes manifests managed through a CI/CD workflow
      required:
        - workflow:github
        - deploy:terraform
      supporting:
        - repo:workflow-primary
        - deploy:kubernetes-manifests
        - lifecycle:deploy
        - runtime:container
    runtime-image:
      description: Container image — a Dockerfile-based service built and published as a container image
      required:
        - runtime:container
      supporting:
        - lifecycle:build
        - lifecycle:runtime
        - lifecycle:deploy
    library-cli:
      description: Library or CLI tool — reusable code published as a package or standalone command-line tool
      # No required facets — catch-all for code repos without a stronger match
      supporting:
        - package:node
        - package:composer
        - lifecycle:build
