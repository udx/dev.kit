kind: archetypeRules
version: udx.io/dev.kit/v1

config:
  archetypes:
    wordpress-site:
      required:
        - framework:wordpress
      supporting:
        - runtime:container
        - package:node
        - package:composer
        - workflow:github
    workflow-repo:
      required:
        - workflow:github
        - repo:workflow-primary
    infra-pipeline:
      required:
        - workflow:github
        - deploy:terraform
      supporting:
        - repo:workflow-primary
        - deploy:kubernetes-manifests
        - lifecycle:deploy
        - runtime:container
    runtime-image:
      required:
        - runtime:container
      supporting:
        - lifecycle:build
        - lifecycle:runtime
        - lifecycle:deploy
    library-cli:
      # No required facets — catch-all for code repos without a stronger match
      supporting:
        - package:node
        - package:composer
        - lifecycle:build
