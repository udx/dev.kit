kind: githubPullRequests
version: udx.io/dev.kit/v1

config:

  # ── PR description templates ────────────────────────────────────────────────
  # Each template defines required sections. Agents pick the type that matches
  # the nature of the change. Sections marked required must always be present.
  templates:
    feature:
      description: "New capability, improvement, or bug fix."
      sections:
        - id: closes
          label: "Closes"
          required: true
          hint: "Closes #N for every linked issue. GitHub auto-closes on merge."
        - id: changes
          label: "Changes"
          required: true
          hint: "Bullet list of what changed and why — not a git log."
        - id: pre_merge_gates
          label: "Pre-merge gates"
          hint: "Any cross-repo dependencies that must land first. Be explicit."
        - id: review_notes
          label: "Review notes"
          hint: "Anything reviewers need to know: risk areas, test coverage, flags."
        - id: backlog
          label: "Backlog from this investigation"
          hint: "New issues discovered — reference by #N if already created."

    deployment:
      description: "Branch promotion (e.g. staging → production)."
      sections:
        - id: related
          label: "Related"
          required: true
          hint: "Link the source issue, the prior staging merge, and any cross-repo PRs."
        - id: summary
          label: "Summary"
          required: true
          hint: "What is being promoted and what it includes."
        - id: blocked_by
          label: "Blocked by"
          hint: "Cross-repo or cross-service dependencies that must land before merge."
        - id: review_notes
          label: "Review notes"
          required: true
          hint: >
            State whether PR creation triggers a plan-mode deployment for review.
            Reviewers must see the infrastructure plan before approving.

    ops:
      description: "Config, infra, or operational change without a linked feature."
      sections:
        - id: changes
          label: "Changes"
          required: true
          hint: "Bullet list of what changed. Reference affected services and environments."
        - id: related
          label: "Related"
          hint: "Linked issues, related PRs, or cross-repo context."
        - id: rollback
          label: "Rollback"
          hint: "How to revert if the change causes issues post-merge."

    hotfix:
      description: "Urgent fix for a production incident."
      sections:
        - id: closes
          label: "Closes"
          required: true
        - id: root_cause
          label: "Root cause"
          required: true
          hint: "One paragraph: what broke, why, how it was found."
        - id: fix
          label: "Fix"
          required: true
          hint: "What was changed and why this is the right fix."
        - id: verification
          label: "Verification"
          required: true
          hint: "How the fix was verified locally and what runtime evidence confirms it."

  # ── Bot reviewers ───────────────────────────────────────────────────────────
  # Known automated reviewers active across UDX/ICAMiami repos.
  # Agents must read and respond to each before requesting human review.
  bots:
    copilot:
      login: copilot-pull-request-reviewer
      role: PR overview summary generated from the diff.
      guidance: >
        Copilot auto-summarizes based on the diff. A clear, complete PR body produces
        a more accurate summary. If Copilot flags a specific issue in a review comment,
        assess it: fix actionable findings, or reply with a clear explanation of why the
        flag is a false positive. Do not ignore Copilot comments without responding.
        After addressing each comment, resolve the conversation thread — unresolved
        Copilot threads block merge.
    devin:
      login: devin-ai-integration
      role: Code review focused on potential bugs.
      guidance: >
        "No Issues Found" requires no action. If Devin reports specific findings, review
        each one. Fix actionable bugs before requesting human review. Dismiss false
        positives with a reply comment explaining the reasoning. Do not merge with
        unaddressed Devin findings unless they are confirmed false positives.
    github-advanced-security:
      login: github-advanced-security
      role: Security scanning (CodeQL, secret scanning, Dependabot).
      guidance: >
        All HIGH and CRITICAL findings block merge. Investigate and resolve before
        opening for human review. MEDIUM and LOW findings should be triaged — document
        suppressions inline with a comment explaining the exception.
    codeql:
      login: CodeQL
      role: Static analysis on JavaScript, Actions, Shell, Dockerfiles, YAML.
      guidance: >
        Fix all true findings. If suppressing a false positive, add an inline comment
        in the source file explaining the exception. Do not merge with unresolved
        CodeQL alerts unless they are documented suppressions.

  # ── Workflow check verification ─────────────────────────────────────────────
  # Named check families seen across UDX/ICAMiami repos.
  # Agents must verify these before marking a PR ready.
  workflow_checks:
    required_to_merge:
      message: >
        All required checks must pass before merge. Do not merge or request human
        review while any required check is failing — investigate the root cause first.
    infra_validation:
      name_pattern: "infrastructure / Configuration & Validation"
      message: >
        This is a Terraform plan. Open the check details and review the plan output
        before approving an infra or deployment PR. A plan with unexpected destroys
        or drift is a signal to investigate before merging.
    infra_deployment:
      name_pattern: "infrastructure / Deployment"
      message: >
        This is Terraform apply. Verify the deployment succeeded in the check details.
        Check for drift, resource errors, or timeout failures — do not treat a green
        check as success without reviewing the apply output.
    infra_report:
      name_pattern: "infrastructure / Process Results & Report"
      message: >
        Post-apply report. Review for warnings, partial failures, or resources left
        in unknown state.
    codeql_check:
      name_pattern: "CodeQL"
      message: Review findings in the Security tab before merging.
    mirror:
      name_pattern: "Mirror to Bitbucket"
      message: >
        Cross-SCM mirror. Failure here means the repo is out of sync with Bitbucket.
        Investigate but do not block merge on mirror failures alone.

  # ── Post-merge actions ──────────────────────────────────────────────────────
  # Steps an agent should take after a PR is merged.
  post_merge:
    - id: issue-autoclose
      message: >
        Verify the linked issue auto-closed via "Closes #N" in the PR body.
        If the issue is still open after merge, close it manually with a comment
        linking the merged PR and a brief summary of what shipped.
    - id: close-out-comment
      message: >
        Post a close-out comment on the linked issue with the merged PR URL,
        exact versions or release tags, a one-line summary of what shipped,
        findings delta (what changed vs. what was expected), and any outstanding
        follow-up items as linked issues. Use exact URLs — not descriptions.
    - id: backlog-issues
      message: >
        For each item listed under "Backlog from this investigation", verify a GitHub
        issue exists. If not, create one. Reference all backlog issues in the close-out
        comment so the follow-up chain is explicit.
    - id: monitoring-verify
      message: >
        If the PR included alert policy, dashboard, or monitoring config changes,
        verify within 24h that alerts are firing correctly and thresholds are sound.
        Open a follow-up issue if tuning is needed.
    - id: release-tag
      message: >
        If the repo follows versioned releases, create a release tag after merging to
        production. Update the changelog with the changes from this PR.

  # ── Agent workflow for PRs ──────────────────────────────────────────────────
  agent_workflow:
    before_creating:
      - id: verify-surface
        message: >
          Detect the canonical verify command from repo context and note it in your
          working plan, but prefer GitHub workflow executions when the repo already
          has CI coverage. Use local verification for scoped debugging, reproducing
          workflow failures, or covering gaps in workflow coverage.
      - id: pick-template
        message: >
          Pick the PR template type (feature, deployment, ops, hotfix) that matches
          the change. Fill every required section. Do not leave sections empty —
          if a section truly does not apply, remove it rather than leaving it blank.
      - id: close-link
        message: >
          Include "Closes #N" for every linked issue. If there are pre-merge gates
          (cross-repo dependencies), call them out explicitly in the PR body.

    after_creating:
      - id: monitor-workflows
        message: >
          After the PR is created, monitor the related GitHub workflow runs and
          status checks. Open failing or slow runs, review the logs, and treat
          workflow execution as the primary verification path when the repo already
          has CI coverage.
      - id: read-bot-reviews
        message: >
          After the PR is created, wait for automated reviews: Copilot, Devin,
          CodeQL, GitHub Advanced Security. Read each review. Address actionable
          findings with code fixes. Reply to false positives and design decisions
          with brief explanations. Resolve every conversation thread after
          addressing it — unresolved threads block merge even when all checks
          pass. Loop through bot feedback after each push until all threads are
          resolved, comments are answered, and merge state is CLEAN.
      - id: check-status
        message: >
          Verify all required status checks pass. For infrastructure PRs, open
          the check details and review the Terraform plan output before requesting
          human review. Do not rely on a green checkmark alone.
      - id: update-description
        message: >
          If bot reviews or check outputs reveal additional context (e.g. a finding
          that widens scope or a plan that shows unexpected drift), update the PR
          body to reflect the new information. The PR body is the source of truth
          for reviewers.

    on_merge:
      - id: post-close-comment
        message: >
          Post a close-out comment on the linked issue with the merged PR URL, what
          shipped, and any follow-up issues. This is the signal that the delivery
          chain is complete.
      - id: open-backlog
        message: >
          Create GitHub issues for any backlog items surfaced during the PR.
          Reference them in the close-out comment so the follow-up chain is explicit.
