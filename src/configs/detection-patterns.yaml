kind: detectionPatterns
version: udx.dev/dev.kit/v1
description: Regex patterns for command, workflow, and env detection

config:
  command_patterns:
    verification: (npm test|pnpm test|yarn test|bun test|make test|bash tests/[^`[:space:]]+|\.\/tests/[^`[:space:]]+|vendor/bin/phpunit|phpunit|pytest|go test|cargo test)
    build: (npm run build|pnpm build|yarn build|bun run build|make build|docker build[^`]*|go build|cargo build|composer build)
    run: (`[A-Za-z0-9._-]+ run[^`]*`|npm start|pnpm start|yarn start|bun run start|make run|docker compose up[^`]*|docker run[^`]*|php -S [^`]*|python -m [^`[:space:]]+|node ([./][^`[:space:]]+|[^`[:space:]]+\.js))
    env_var: ([A-Z][A-Z0-9_]{2,}=|\$\{[A-Z][A-Z0-9_]{2,}\})
    workflow_contract: (workflow_call:|workflow_dispatch:|inputs:|outputs:)
    documentation_sections: (##[[:space:]]+(Quick Start|Usage|Development|Examples|Resources|Docs|Documentation))
    yaml_api_version: ^[[:space:]]*apiVersion:[[:space:]]*[^[:space:]]
    yaml_kind: ^[[:space:]]*kind:[[:space:]]*[^[:space:]]
