name: Git Sync
description: Logical commit and synchronization workflow.
inputs:
  task_id:
    description: Current task ID for traceability.
    required: true
  dry_run:
    description: Preview changes without committing.
    default: "false"
  message:
    description: Optional commit message prefix.
    default: ""

steps:
  - id: detect-drift
    name: Identify Repository Drift
    run: |
      staged=$(git diff --name-only --cached)
      unstaged=$(git diff --name-only)
      untracked=$(git ls-files --others --exclude-standard)
      echo "$staged $unstaged $untracked" | tr ' ' '\n' | sort -u > .drift.tmp

  - id: group-docs
    name: Group Documentation Changes
    run: bash src/ai/data/skill-packs/dev-kit-git-sync/scripts/process_group.sh "docs" "^docs/|^README.md" "${{inputs.task_id}}" "${{inputs.dry_run}}" "${{inputs.message}}"

  - id: group-ai
    name: Group AI & Integration Changes
    run: bash src/ai/data/skill-packs/dev-kit-git-sync/scripts/process_group.sh "ai" "^src/ai/|^.gemini/" "${{inputs.task_id}}" "${{inputs.dry_run}}" "${{inputs.message}}"

  - id: group-cli
    name: Group CLI & Lib Changes
    run: bash src/ai/data/skill-packs/dev-kit-git-sync/scripts/process_group.sh "cli" "^bin/|^lib/|^src/cli/" "${{inputs.task_id}}" "${{inputs.dry_run}}" "${{inputs.message}}"

  - id: group-core
    name: Group Core Infrastructure Changes
    run: bash src/ai/data/skill-packs/dev-kit-git-sync/scripts/process_group.sh "core" "^src/|^environment.yaml|^context7.json" "${{inputs.task_id}}" "${{inputs.dry_run}}" "${{inputs.message}}"

  - id: cleanup
    name: Finalize and Cleanup
    run: |
      rm -f .drift.tmp
      echo "--- Git Sync Workflow Complete ---"
