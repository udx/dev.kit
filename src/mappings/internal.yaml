---
kind: internalMappings
description: "Maps user intents to internal deterministic engineering skills and workflows."
version: udx/dev.kit/mappings/v1

# Internal Skill-Packs (Scripts)
# Priority: Exact Name > Keywords > Metadata
skills:
  - name: "visualizer"
    intent: ["diagram", "mermaid", "svg", "export", "flowchart"]
    description: "Generate and export high-fidelity Mermaid diagrams."
  - name: "git-sync"
    intent: ["sync", "commit", "drift", "atomic", "resolve"]
    description: "Logical, atomic commits and drift resolution."
  - name: "experience-capture"
    intent: ["capture", "session", "knowledge", "learnings", "distill"]
    description: "Convert session learnings into persistent repo power."
  - name: "core"
    intent: ["health", "bootstrap", "env", "doctor", "system"]
    description: "Manage environment health and agent synchronization."
  - name: "compliance"
    intent: ["standards", "12-factor", "lint", "validate", "audit"]
    description: "Validate repository state against UDX standards."

# Internal Workflows (Markdown-based engineering loops)
workflows:
  - name: "migration-demo"
    intent: ["migrate", "docker", "refactor", "scenario"]
    path: "docs/scenarios/migration-demo.md"
  - name: "visual-engineering"
    intent: ["visual", "asset", "documentation", "export"]
    path: "src/ai/data/skill-packs/dev-kit-visualizer/SKILL.md"
