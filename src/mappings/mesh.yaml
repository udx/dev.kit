---
kind: externalMappings
description: "Maps user intents to external repository-bound skills and configurations (The Skill Mesh)."
version: udx/dev.kit/mesh/v1

# Skill Mesh References
# Priority: Intent Keyword > Exact URI Match
mesh:
  - name: "workflow-templates"
    intent: ["ci", "cd", "pipeline", "github actions", "templates"]
    uri: "udx/reusable-workflows"
    description: "Shared CI/CD pipeline definitions and standard reusable workflows."
  - name: "docker-runner"
    intent: ["runner", "infrastructure", "docker", "execution", "agent"]
    uri: "udx/worker"
    description: "Base execution environment image (UDX Worker)."
  - name: "worker-php"
    intent: ["php", "wordpress", "php-worker", "runtime"]
    uri: "udx/worker-php"
    description: "UDX Worker specialized for running PHP applications."
  - name: "worker-nodejs"
    intent: ["nodejs", "node", "javascript", "node-worker"]
    uri: "udx/worker-nodejs"
    description: "UDX Worker specialized for running NodeJS applications."
  - name: "worker-deployment"
    intent: ["deploy", "deployment", "orchestration", "worker-deploy"]
    uri: "udx/worker-deployment"
    description: "Simple tool to deploy worker-based containers."
  - name: "docker-sftp"
    intent: ["sftp", "ssh", "access", "github-keys", "storage"]
    uri: "udx/docker-sftp"
    description: "Secure SSH/SFTP access to containers using GitHub keys for authentication."

# @udx-scoped NPM CLI Tools & Libraries
packages:
  - name: "@udx/mcurl"
    intent: ["mcurl", "curl", "fetch-markdown", "url-to-markdown"]
    uri: "npm:@udx/mcurl"
    description: "curl for Markdown - fetches content from URLs and converts to markdown."
  - name: "@udx/mq"
    intent: ["mq", "markdown-query", "markdown-jq", "process-markdown"]
    uri: "npm:@udx/mq"
    description: "Markdown Query - jq-like processing for Markdown documents."
  - name: "@udx/mysec"
    intent: ["mysec", "secrets", "env-sync", "cloud-secrets", "github-secrets"]
    uri: "npm:@udx/mysec"
    description: "CLI tool to sync environment variable secrets with cloud secret stores and GitHub."
  - name: "@udx/md.view"
    intent: ["md.view", "view-markdown", "markdown-viewer", "mermaid-preview"]
    uri: "npm:@udx/md.view"
    description: "Live Markdown viewer with print-ready styling and Mermaid support."
  - name: "@udx/md2html"
    intent: ["md2html", "convert-markdown", "html-export", "professional-styling"]
    uri: "npm:@udx/md2html"
    description: "Magazine-quality Markdown to HTML converter with professional styling."
  - name: "@udx/strapi-provider-upload-google-cloud-storage"
    intent: ["strapi", "gcs", "upload", "google-cloud-storage", "strapi-upload"]
    uri: "npm:@udx/strapi-provider-upload-google-cloud-storage"
    description: "Google Cloud Storage Provider for Strapi Upload."
